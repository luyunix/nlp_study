      <text x="818.8000000000001" y="372" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="23" font-weight="600" fill="#16324F">分析与特征</text>
    </g>
<g>
      <rect x="945.2" y="245" width="184.8" height="190" rx="24" fill="#FFECE7" stroke="#D6674F" stroke-width="3"/>
      <circle cx="1037.6000000000001" cy="285" r="19" fill="#D6674F"/>
      <text x="1037.6000000000001" y="292" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="700" fill="white">5</text>
      <text x="1037.6000000000001" y="372" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="23" font-weight="600" fill="#16324F">可训练数据</text>
    </g>
  <rect x="70" y="512" width="1060" height="105" rx="20" fill="#102A43"/>
  <text x="600" y="553" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="21" font-weight="500" fill="#FFFFFF">原始文字不能直接、稳定地送进模型。我们要先把文字切成有意义的单位，再变成数字，检查数</text>
<text x="600" y="583" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="21" font-weight="500" fill="#FFFFFF">据有没有偏斜，最后才做特征加工和数据增强。</text>
  <text x="1130" y="650" text-anchor="end" font-family="sans-serif" font-size="16" fill="#6C8194">原创示意图</text>
</svg>