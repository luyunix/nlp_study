<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">文本预处理全景：先看清问题，再动手处理</title>
  <desc id="desc">原始文本，然后基础处理，然后数字表示，然后分析与特征，然后可训练数据</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#F8FBFF"/><stop offset="1" stop-color="#F7F4FF"/></linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#60788E"/></marker>
  </defs>
  <rect width="1200" height="680" rx="34" fill="url(#bg)"/>
  <text x="70" y="62" font-family="sans-serif" font-size="18" font-weight="700" fill="#3B6A91">第 01 节 · 概念图</text>
  <text x="70" y="112" text-anchor="start" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="34" font-weight="760" fill="#102A43">文本预处理全景：先看清问题，再动手处理</text>
  <line x1="260.8" y1="340" x2="280.8" y2="340" stroke="#60788E" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="479.6" y1="340" x2="499.6" y2="340" stroke="#60788E" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="698.4000000000001" y1="340" x2="718.4000000000001" y2="340" stroke="#60788E" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="917.2" y1="340" x2="937.2" y2="340" stroke="#60788E" stroke-width="4" marker-end="url(#arrow)"/>
  <g>
      <rect x="70" y="245" width="184.8" height="190" rx="24" fill="#E7F3FF" stroke="#3B82C4" stroke-width="3"/>
      <circle cx="162.4" cy="285" r="19" fill="#3B82C4"/>
      <text x="162.4" y="292" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="700" fill="white">1</text>
      <text x="162.4" y="372" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="23" font-weight="600" fill="#16324F">原始文本</text>
    </g>
<g>
      <rect x="288.8" y="245" width="184.8" height="190" rx="24" fill="#EAF8F0" stroke="#31966F" stroke-width="3"/>
      <circle cx="381.20000000000005" cy="285" r="19" fill="#31966F"/>
      <text x="381.20000000000005" y="292" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="700" fill="white">2</text>
      <text x="381.20000000000005" y="372" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="23" font-weight="600" fill="#16324F">基础处理</text>
    </g>
<g>
      <rect x="507.6" y="245" width="184.8" height="190" rx="24" fill="#FFF4D9" stroke="#D69424" stroke-width="3"/>
      <circle cx="600" cy="285" r="19" fill="#D69424"/>
      <text x="600" y="292" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="700" fill="white">3</text>
      <text x="600" y="372" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="23" font-weight="600" fill="#16324F">数字表示</text>
    </g>
<g>
      <rect x="726.4000000000001" y="245" width="184.8" height="190" rx="24" fill="#F6EAFF" stroke="#8C62C7" stroke-width="3"/>
      <circle cx="818.8000000000001" cy="285" r="19" fill="#8C62C7"/>
