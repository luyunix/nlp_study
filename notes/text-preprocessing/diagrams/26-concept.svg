<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">chain：把嵌套词列表铺平成一个词流</title>
  <desc id="desc">句1词列表，然后句2词列表，然后chain 串接，然后单一词流</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#F8FBFF"/><stop offset="1" stop-color="#F7F4FF"/></linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#60788E"/></marker>
  </defs>
  <rect width="1200" height="680" rx="34" fill="url(#bg)"/>
  <text x="70" y="62" font-family="sans-serif" font-size="18" font-weight="700" fill="#3B6A91">第 26 节 · 概念图</text>
  <text x="70" y="112" text-anchor="start" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="34" font-weight="760" fill="#102A43">chain：把嵌套词列表铺平成一个词流</text>
  <line x1="315.5" y1="340" x2="335.5" y2="340" stroke="#60788E" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="589" y1="340" x2="609" y2="340" stroke="#60788E" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="862.5" y1="340" x2="882.5" y2="340" stroke="#60788E" stroke-width="4" marker-end="url(#arrow)"/>
  <g>
      <rect x="70" y="245" width="239.5" height="190" rx="24" fill="#E7F3FF" stroke="#3B82C4" stroke-width="3"/>
      <circle cx="189.75" cy="285" r="19" fill="#3B82C4"/>
      <text x="189.75" y="292" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="700" fill="white">1</text>
      <text x="189.75" y="372" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="23" font-weight="600" fill="#16324F">句1词列表</text>
    </g>
<g>
      <rect x="343.5" y="245" width="239.5" height="190" rx="24" fill="#EAF8F0" stroke="#31966F" stroke-width="3"/>
      <circle cx="463.25" cy="285" r="19" fill="#31966F"/>
      <text x="463.25" y="292" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="700" fill="white">2</text>
      <text x="463.25" y="372" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="23" font-weight="600" fill="#16324F">句2词列表</text>
    </g>
<g>
      <rect x="617" y="245" width="239.5" height="190" rx="24" fill="#FFF4D9" stroke="#D69424" stroke-width="3"/>
      <circle cx="736.75" cy="285" r="19" fill="#D69424"/>
      <text x="736.75" y="292" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="700" fill="white">3</text>
      <text x="736.75" y="372" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="23" font-weight="600" fill="#16324F">chain 串接</text>
    </g>
<g>
      <rect x="890.5" y="245" width="239.5" height="190" rx="24" fill="#F6EAFF" stroke="#8C62C7" stroke-width="3"/>
      <circle cx="1010.25" cy="285" r="19" fill="#8C62C7"/>
      <text x="1010.25" y="292" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="700" fill="white">4</text>
      <text x="1010.25" y="372" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="23" font-weight="600" fill="#16324F">单一词流</text>
    </g>
  <rect x="70" y="512" width="1060" height="105" rx="20" fill="#102A43"/>
  <text x="600" y="553" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="21" font-weight="500" fill="#FFFFFF">每句话分词后得到一个列表，整个语料就是“列表的列表”。chain.from_iter</text>
<text x="600" y="583" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif" font-size="21" font-weight="500" fill="#FFFFFF">able 能把它惰性串起来，便于做全局词频。</text>
  <text x="1130" y="650" text-anchor="end" font-family="sans-serif" font-size="16" fill="#6C8194">原创示意图</text>
</svg>