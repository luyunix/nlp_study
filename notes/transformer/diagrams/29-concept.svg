<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">DecoderLayer 三个子层</title>
  <desc id="desc">Decoder 比 Encoder 多一个跨注意力子层，用于读取源序列信息。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0b1730"/>
      <stop offset="1" stop-color="#15102b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000" flood-opacity=".3"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1200" height="680" rx="34" fill="url(#bg)"/>
  <circle cx="1120" cy="70" r="150" fill="#7c3aed" opacity=".09"/>
  <circle cx="70" cy="650" r="190" fill="#0284c7" opacity=".08"/>
  <g filter="url(#shadow)">
    <rect x="55" y="45" width="1090" height="590" rx="30" fill="#081426" fill-opacity=".6" stroke="#26334d"/>
  </g>
  <text x="90" y="100" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#38bdf8">第 29 节 · 概念图</text>
  <text x="90" y="145" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="800" fill="#f8fafc">DecoderLayer 三个子层</text>
  <g font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">
    <rect x="260" y="170" width="680" height="54" rx="16" fill="#102a43" stroke="#38bdf8" stroke-width="2"/><text x="600" y="205" text-anchor="middle" font-size="21" font-weight="600" fill="#dbeafe">目标表示 x</text><path d="M 600 226 L 600 236" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/><rect x="294" y="233" width="612" height="54" rx="16" fill="#172554" stroke="#818cf8" stroke-width="2"/><text x="600" y="268" text-anchor="middle" font-size="21" font-weight="600" fill="#dbeafe">Masked Self-Attention</text><path d="M 600 289 L 600 299" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/><rect x="328" y="296" width="544" height="54" rx="16" fill="#102a43" stroke="#c084fc" stroke-width="2"/><text x="600" y="331" text-anchor="middle" font-size="21" font-weight="600" fill="#dbeafe">Cross-Attention：Q=x，K=V=memory</text><path d="M 600 352 L 600 362" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/><rect x="362" y="359" width="476" height="54" rx="16" fill="#172554" stroke="#fb7185" stroke-width="2"/><text x="600" y="394" text-anchor="middle" font-size="21" font-weight="600" fill="#dbeafe">Position-wise FFN</text><path d="M 600 415 L 600 425" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/><rect x="396" y="422" width="408" height="54" rx="16" fill="#102a43" stroke="#fbbf24" stroke-width="2"/><text x="600" y="457" text-anchor="middle" font-size="21" font-weight="600" fill="#dbeafe">残差与规范化</text><path d="M 600 478 L 600 488" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/><rect x="430" y="485" width="340" height="54" rx="16" fill="#172554" stroke="#34d399" stroke-width="2"/><text x="600" y="520" text-anchor="middle" font-size="21" font-weight="600" fill="#dbeafe">输出 x′</text>
  </g>
  <rect x="90" y="565" width="1020" height="48" rx="14" fill="#0f2741" stroke="#1e3a5f"/>
  <text x="600" y="596" text-anchor="middle" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="600" fill="#bae6fd">Decoder 比 Encoder 多一个跨注意力子层，用于读取源序列信息。</text>
</svg>
