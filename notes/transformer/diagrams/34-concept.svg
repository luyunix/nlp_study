    <text x="382.79999999999995" y="338.5" text-anchor="middle" font-size="21" font-weight="600" fill="#dbeafe">encode(src,</text>
<text x="382.79999999999995" y="367.5" text-anchor="middle" font-size="21" font-weight="600" fill="#dbeafe">src_mask)</text>
  <path d="M 480.4 345 L 496.4 345" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="502.4" y="270" width="195.2" height="150" rx="22" fill="#111c33" stroke="#c084fc" stroke-width="2"/>
