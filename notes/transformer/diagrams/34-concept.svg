<text x="825.1999999999999" y="382" text-anchor="middle" font-size="21" font-weight="600" fill="#dbeafe">tgt_mask)</text>
  <path d="M 922.8 345 L 938.8 345" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
