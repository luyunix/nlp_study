    <rect x="60" y="270" width="195.2" height="150" rx="22" fill="#111c33" stroke="#38bdf8" stroke-width="2"/>
    <rect x="60" y="270" width="8" height="150" rx="4" fill="#38bdf8"/>
    <text x="161.6" y="353" text-anchor="middle" font-size="21" font-weight="600" fill="#dbeafe">src</text>
  <path d="M 259.2 345 L 275.2 345" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
