    <text x="604" y="353" text-anchor="middle" font-size="21" font-weight="600" fill="#dbeafe">得到 memory</text>
  <path d="M 701.5999999999999 345 L 717.5999999999999 345" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
