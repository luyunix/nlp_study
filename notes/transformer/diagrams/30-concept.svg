<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">DecoderLayer 测试</title>
  <desc id="desc">测试应让源长度与目标长度不同，以暴露错误的维度假设。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.55" stop-color="#f4fbf9"/>
      <stop offset="1" stop-color="#faf7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#47716d" flood-opacity=".12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1200" height="680" rx="34" fill="url(#bg)"/>
  <circle cx="1120" cy="70" r="150" fill="#c4b5fd" opacity=".22"/>
  <circle cx="70" cy="650" r="190" fill="#bae6fd" opacity=".28"/>
  <g filter="url(#shadow)">
    <rect x="55" y="45" width="1090" height="590" rx="30" fill="#ffffff" fill-opacity=".88" stroke="#d9e5e3"/>
  </g>
  <text x="90" y="100" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#38bdf8">第 30 节 · 概念图</text>
  <text x="90" y="145" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="800" fill="#17343a">DecoderLayer 测试</text>
  <g font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">
    <rect x="95" y="165" width="1010" height="350" rx="28" fill="#f0fdf9" stroke="#34a978" stroke-width="3"/><text x="170" y="220" text-anchor="start" font-size="28" font-weight="800" fill="#16835e">✓  可验证条件</text><circle cx="150" cy="268" r="13" fill="#d1fae5" stroke="#34a978" stroke-width="2"/><text x="150" y="275" text-anchor="middle" font-size="18" font-weight="600" fill="#047857">✓</text><text x="180" y="275" text-anchor="start" font-size="21" font-weight="500" fill="#16324f">x [B,Lt,D]</text><circle cx="625" cy="268" r="13" fill="#d1fae5" stroke="#34a978" stroke-width="2"/><text x="625" y="275" text-anchor="middle" font-size="18" font-weight="600" fill="#047857">✓</text><text x="655" y="275" text-anchor="start" font-size="21" font-weight="500" fill="#16324f">memory [B,Ls,D]</text><circle cx="150" cy="350" r="13" fill="#d1fae5" stroke="#34a978" stroke-width="2"/><text x="150" y="357" text-anchor="middle" font-size="18" font-weight="600" fill="#047857">✓</text><text x="180" y="357" text-anchor="start" font-size="21" font-weight="500" fill="#16324f">tgt_mask [B,1,Lt,Lt]</text><circle cx="625" cy="350" r="13" fill="#d1fae5" stroke="#34a978" stroke-width="2"/><text x="625" y="357" text-anchor="middle" font-size="18" font-weight="600" fill="#047857">✓</text><text x="655" y="357" text-anchor="start" font-size="21" font-weight="500" fill="#16324f">src_mask [B,1,1,Ls]</text><circle cx="150" cy="432" r="13" fill="#d1fae5" stroke="#34a978" stroke-width="2"/><text x="150" y="439" text-anchor="middle" font-size="18" font-weight="600" fill="#047857">✓</text><text x="180" y="439" text-anchor="start" font-size="21" font-weight="500" fill="#16324f">输出 [B,Lt,D]</text>
  </g>
  <rect x="90" y="565" width="1020" height="48" rx="14" fill="#e8f5f2" stroke="#b9d8d3"/>
  <text x="600" y="596" text-anchor="middle" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="600" fill="#285b5d">测试应让源长度与目标长度不同，以暴露错误的维度假设。</text>
