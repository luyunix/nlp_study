<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">完整模型组装</title>
  <desc id="desc">源词表与目标词表可能不同，因此两侧 Embedding 不应盲目共享。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0b1730"/>
      <stop offset="1" stop-color="#15102b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000" flood-opacity=".3"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1200" height="680" rx="34" fill="url(#bg)"/>
  <circle cx="1120" cy="70" r="150" fill="#7c3aed" opacity=".09"/>
  <circle cx="70" cy="650" r="190" fill="#0284c7" opacity=".08"/>
  <g filter="url(#shadow)">
    <rect x="55" y="45" width="1090" height="590" rx="30" fill="#081426" fill-opacity=".6" stroke="#26334d"/>
  </g>
  <text x="90" y="100" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#38bdf8">第 36 节 · 概念图</text>
  <text x="90" y="145" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="800" fill="#f8fafc">完整模型组装</text>
  <g font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">
    
    <rect x="430" y="160" width="340" height="80" rx="22" fill="#111c33" stroke="#fbbf24" stroke-width="2"/>
    <rect x="430" y="160" width="8" height="80" rx="4" fill="#fbbf24"/>
    <text x="604" y="208" text-anchor="middle" font-size="21" font-weight="600" fill="#dbeafe">make_model</text>
  <path d="M 600 245 L 170 335" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="80" y="340" width="180" height="120" rx="22" fill="#111c33" stroke="#38bdf8" stroke-width="2"/>
    <rect x="80" y="340" width="8" height="120" rx="4" fill="#38bdf8"/>
    <text x="174" y="408" text-anchor="middle" font-size="21" font-weight="600" fill="#dbeafe">Embeddings + PE</text>
  <path d="M 600 245 L 378 335" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="288" y="340" width="180" height="120" rx="22" fill="#111c33" stroke="#818cf8" stroke-width="2"/>
    <rect x="288" y="340" width="8" height="120" rx="4" fill="#818cf8"/>
    <text x="382" y="408" text-anchor="middle" font-size="21" font-weight="600" fill="#dbeafe">Encoder × N</text>
  <path d="M 600 245 L 586 335" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="496" y="340" width="180" height="120" rx="22" fill="#111c33" stroke="#c084fc" stroke-width="2"/>
    <rect x="496" y="340" width="8" height="120" rx="4" fill="#c084fc"/>
    <text x="590" y="408" text-anchor="middle" font-size="21" font-weight="600" fill="#dbeafe">Decoder × N</text>
  <path d="M 600 245 L 794 335" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="704" y="340" width="180" height="120" rx="22" fill="#111c33" stroke="#fb7185" stroke-width="2"/>
    <rect x="704" y="340" width="8" height="120" rx="4" fill="#fb7185"/>
    <text x="798" y="408" text-anchor="middle" font-size="21" font-weight="600" fill="#dbeafe">Generator</text>
  <path d="M 600 245 L 1002 335" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="912" y="340" width="180" height="120" rx="22" fill="#111c33" stroke="#34d399" stroke-width="2"/>
    <rect x="912" y="340" width="8" height="120" rx="4" fill="#34d399"/>
    <text x="1006" y="393.5" text-anchor="middle" font-size="21" font-weight="600" fill="#dbeafe">Xavier 参数初始</text>
<text x="1006" y="422.5" text-anchor="middle" font-size="21" font-weight="600" fill="#dbeafe">化</text>
  
  </g>
  <rect x="90" y="565" width="1020" height="48" rx="14" fill="#0f2741" stroke="#1e3a5f"/>
  <text x="600" y="596" text-anchor="middle" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="600" fill="#bae6fd">源词表与目标词表可能不同，因此两侧 Embedding 不应盲目共享。</text>
</svg>
