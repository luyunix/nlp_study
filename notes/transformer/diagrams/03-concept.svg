<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Encoder 上半部分</title>
  <desc id="desc">Self-Attention 中 Q、K、V 都来自同一份 Encoder 表示。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.55" stop-color="#f4fbf9"/>
      <stop offset="1" stop-color="#faf7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#47716d" flood-opacity=".12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1200" height="680" rx="34" fill="url(#bg)"/>
  <circle cx="1120" cy="70" r="150" fill="#c4b5fd" opacity=".22"/>
  <circle cx="70" cy="650" r="190" fill="#bae6fd" opacity=".28"/>
  <g filter="url(#shadow)">
    <rect x="55" y="45" width="1090" height="590" rx="30" fill="#ffffff" fill-opacity=".88" stroke="#d9e5e3"/>
  </g>
  <text x="90" y="100" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#38bdf8">第 03 节 · 概念图</text>
  <text x="90" y="145" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="800" fill="#17343a">Encoder 上半部分</text>
  <g font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">
    <rect x="260" y="170" width="680" height="54" rx="16" fill="#eef8f5" stroke="#38bdf8" stroke-width="2"/><text x="600" y="205" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">输入词元</text><path d="M 600 226 L 600 236" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/><rect x="294" y="233" width="612" height="54" rx="16" fill="#eef4ff" stroke="#818cf8" stroke-width="2"/><text x="600" y="268" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">词嵌入 Embedding</text><path d="M 600 289 L 600 299" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/><rect x="328" y="296" width="544" height="54" rx="16" fill="#eef8f5" stroke="#c084fc" stroke-width="2"/><text x="600" y="331" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">位置编码 Positional Encoding</text><path d="M 600 352 L 600 362" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/><rect x="362" y="359" width="476" height="54" rx="16" fill="#eef4ff" stroke="#fb7185" stroke-width="2"/><text x="600" y="394" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">Multi-Head Self-Attention</text><path d="M 600 415 L 600 425" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/><rect x="396" y="422" width="408" height="54" rx="16" fill="#eef8f5" stroke="#d49a19" stroke-width="2"/><text x="600" y="457" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">Add &amp; Norm</text><path d="M 600 478 L 600 488" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/><rect x="430" y="485" width="340" height="54" rx="16" fill="#eef4ff" stroke="#34a978" stroke-width="2"/><text x="600" y="520" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">前馈网络 FFN</text>
  </g>
  <rect x="90" y="565" width="1020" height="48" rx="14" fill="#e8f5f2" stroke="#b9d8d3"/>
  <text x="600" y="596" text-anchor="middle" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="600" fill="#285b5d">Self-Attention 中 Q、K、V 都来自同一份 Encoder 表示。</text>
