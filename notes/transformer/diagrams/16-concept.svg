<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">多头注意力：拆分</title>
  <desc id="desc">拆头不是复制输入，而是让不同投影子空间学习不同的关联模式。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.55" stop-color="#f4fbf9"/>
      <stop offset="1" stop-color="#faf7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#47716d" flood-opacity=".12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1200" height="680" rx="34" fill="url(#bg)"/>
  <circle cx="1120" cy="70" r="150" fill="#c4b5fd" opacity=".22"/>
  <circle cx="70" cy="650" r="190" fill="#bae6fd" opacity=".28"/>
  <g filter="url(#shadow)">
    <rect x="55" y="45" width="1090" height="590" rx="30" fill="#ffffff" fill-opacity=".88" stroke="#d9e5e3"/>
  </g>
  <text x="90" y="100" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#38bdf8">第 16 节 · 概念图</text>
  <text x="90" y="145" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="800" fill="#17343a">多头注意力：拆分</text>
  <g font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">
    
    <rect x="70" y="285" width="180" height="110" rx="22" fill="#ffffff" stroke="#38bdf8" stroke-width="2"/>
    <rect x="70" y="285" width="8" height="110" rx="4" fill="#38bdf8"/>
    <text x="164" y="333.5" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">输入</text>
<text x="164" y="362.5" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">[B,L,D]</text>
  <path d="M 255 340 L 320 340" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="330" y="145" width="210" height="74" rx="22" fill="#ffffff" stroke="#38bdf8" stroke-width="2"/>
    <rect x="330" y="145" width="8" height="74" rx="4" fill="#38bdf8"/>
    <text x="439" y="190" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">Head 1  [B,L,dₖ]</text>
  <path d="M 542 182 L 650 270" stroke="#38bdf8" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="330" y="250" width="210" height="74" rx="22" fill="#ffffff" stroke="#818cf8" stroke-width="2"/>
    <rect x="330" y="250" width="8" height="74" rx="4" fill="#818cf8"/>
    <text x="439" y="295" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">Head 2  [B,L,dₖ]</text>
  <path d="M 542 287 L 650 288" stroke="#818cf8" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="330" y="355" width="210" height="74" rx="22" fill="#ffffff" stroke="#c084fc" stroke-width="2"/>
    <rect x="330" y="355" width="8" height="74" rx="4" fill="#c084fc"/>
    <text x="439" y="400" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">Head 3  [B,L,dₖ]</text>
  <path d="M 542 392 L 650 306" stroke="#c084fc" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="330" y="460" width="210" height="74" rx="22" fill="#ffffff" stroke="#fb7185" stroke-width="2"/>
    <rect x="330" y="460" width="8" height="74" rx="4" fill="#fb7185"/>
    <text x="439" y="505" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">Head 4  [B,L,dₖ]</text>
  <path d="M 542 497 L 650 324" stroke="#fb7185" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="660" y="255" width="200" height="170" rx="22" fill="#ffffff" stroke="#fbbf24" stroke-width="2"/>
    <rect x="660" y="255" width="8" height="170" rx="4" fill="#fbbf24"/>
    <text x="764" y="333.5" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">Concat</text>
<text x="764" y="362.5" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">[B,L,D]</text>
  <path d="M 865 340 L 930 340" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="940" y="285" width="190" height="110" rx="22" fill="#ffffff" stroke="#34d399" stroke-width="2"/>
    <rect x="940" y="285" width="8" height="110" rx="4" fill="#34d399"/>
    <text x="1039" y="348" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">输出投影</text>
  
  </g>
  <rect x="90" y="565" width="1020" height="48" rx="14" fill="#e8f5f2" stroke="#b9d8d3"/>
  <text x="600" y="596" text-anchor="middle" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="600" fill="#285b5d">拆头不是复制输入，而是让不同投影子空间学习不同的关联模式。</text>
</svg>
