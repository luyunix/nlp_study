<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">位置编码形状测试</title>
  <desc id="desc">测试重点是长度切片、batch 广播、设备一致性与输出形状不变。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.55" stop-color="#f4fbf9"/>
      <stop offset="1" stop-color="#faf7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#47716d" flood-opacity=".12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1200" height="680" rx="34" fill="url(#bg)"/>
  <circle cx="1120" cy="70" r="150" fill="#c4b5fd" opacity=".22"/>
  <circle cx="70" cy="650" r="190" fill="#bae6fd" opacity=".28"/>
  <g filter="url(#shadow)">
    <rect x="55" y="45" width="1090" height="590" rx="30" fill="#ffffff" fill-opacity=".88" stroke="#d9e5e3"/>
  </g>
  <text x="90" y="100" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#38bdf8">第 10 节 · 概念图</text>
  <text x="90" y="145" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="800" fill="#17343a">位置编码形状测试</text>
  <g font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">
    
    <rect x="60" y="270" width="195.2" height="150" rx="22" fill="#ffffff" stroke="#38bdf8" stroke-width="2"/>
    <rect x="60" y="270" width="8" height="150" rx="4" fill="#38bdf8"/>
    <text x="161.6" y="338.5" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">输入 x</text>
<text x="161.6" y="367.5" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">[B,L,D]</text>
  <path d="M 259.2 345 L 275.2 345" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="281.2" y="270" width="195.2" height="150" rx="22" fill="#ffffff" stroke="#818cf8" stroke-width="2"/>
    <rect x="281.2" y="270" width="8" height="150" rx="4" fill="#818cf8"/>
    <text x="382.79999999999995" y="338.5" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">截取 pe[:L]</text>
<text x="382.79999999999995" y="367.5" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">[1,L,D]</text>
  <path d="M 480.4 345 L 496.4 345" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="502.4" y="270" width="195.2" height="150" rx="22" fill="#ffffff" stroke="#c084fc" stroke-width="2"/>
    <rect x="502.4" y="270" width="8" height="150" rx="4" fill="#c084fc"/>
    <text x="604" y="353" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">广播相加</text>
  <path d="M 701.5999999999999 345 L 717.5999999999999 345" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="723.5999999999999" y="270" width="195.2" height="150" rx="22" fill="#ffffff" stroke="#fb7185" stroke-width="2"/>
    <rect x="723.5999999999999" y="270" width="8" height="150" rx="4" fill="#fb7185"/>
    <text x="825.1999999999999" y="353" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">Dropout</text>
  <path d="M 922.8 345 L 938.8 345" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="944.8" y="270" width="195.2" height="150" rx="22" fill="#ffffff" stroke="#fbbf24" stroke-width="2"/>
    <rect x="944.8" y="270" width="8" height="150" rx="4" fill="#fbbf24"/>
    <text x="1046.3999999999999" y="338.5" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">输出</text>
<text x="1046.3999999999999" y="367.5" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">[B,L,D]</text>
  
  </g>
  <rect x="90" y="565" width="1020" height="48" rx="14" fill="#e8f5f2" stroke="#b9d8d3"/>
  <text x="600" y="596" text-anchor="middle" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="600" fill="#285b5d">测试重点是长度切片、batch 广播、设备一致性与输出形状不变。</text>
</svg>
