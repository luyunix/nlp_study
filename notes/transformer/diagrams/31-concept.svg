<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Decoder 堆叠与共享 memory</title>
  <desc id="desc">每个 DecoderLayer 都读取同一份 memory；变化的是目标侧隐藏状态 x。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0b1730"/>
      <stop offset="1" stop-color="#15102b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000" flood-opacity=".3"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1200" height="680" rx="34" fill="url(#bg)"/>
  <circle cx="1120" cy="70" r="150" fill="#7c3aed" opacity=".09"/>
  <circle cx="70" cy="650" r="190" fill="#0284c7" opacity=".08"/>
  <g filter="url(#shadow)">
    <rect x="55" y="45" width="1090" height="590" rx="30" fill="#081426" fill-opacity=".6" stroke="#26334d"/>
  </g>
  <text x="90" y="100" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#38bdf8">第 31 节 · 概念图</text>
  <text x="90" y="145" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="800" fill="#f8fafc">Decoder 堆叠与共享 memory</text>
  <g font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">
    <rect x="120" y="150" width="350" height="380" rx="30" fill="#0d2238" stroke="#38bdf8" stroke-width="3"/><rect x="730" y="150" width="350" height="380" rx="30" fill="#21143a" stroke="#c084fc" stroke-width="3"/><text x="295" y="205" text-anchor="middle" font-size="27" font-weight="800" fill="#38bdf8">ENCODER</text><text x="905" y="205" text-anchor="middle" font-size="27" font-weight="800" fill="#c084fc">DECODER</text>
    <rect x="165" y="245" width="260" height="62" rx="22" fill="#111c33" stroke="#38bdf8" stroke-width="2"/>
    <rect x="165" y="245" width="8" height="62" rx="4" fill="#38bdf8"/>
    <text x="299" y="284" text-anchor="middle" font-size="21" font-weight="600" fill="#dbeafe">源序列</text>
  
    <rect x="165" y="333" width="260" height="62" rx="22" fill="#111c33" stroke="#38bdf8" stroke-width="2"/>
    <rect x="165" y="333" width="8" height="62" rx="4" fill="#38bdf8"/>
    <text x="299" y="372" text-anchor="middle" font-size="21" font-weight="600" fill="#dbeafe">Encoder × N</text>
  
    <rect x="165" y="421" width="260" height="62" rx="22" fill="#111c33" stroke="#38bdf8" stroke-width="2"/>
    <rect x="165" y="421" width="8" height="62" rx="4" fill="#38bdf8"/>
    <text x="299" y="460" text-anchor="middle" font-size="21" font-weight="600" fill="#dbeafe">memory</text>
  
    <rect x="775" y="245" width="260" height="62" rx="22" fill="#111c33" stroke="#c084fc" stroke-width="2"/>
    <rect x="775" y="245" width="8" height="62" rx="4" fill="#c084fc"/>
    <text x="909" y="284" text-anchor="middle" font-size="21" font-weight="600" fill="#dbeafe">DecoderLayer 1</text>
  
    <rect x="775" y="333" width="260" height="62" rx="22" fill="#111c33" stroke="#c084fc" stroke-width="2"/>
    <rect x="775" y="333" width="8" height="62" rx="4" fill="#c084fc"/>
    <text x="909" y="372" text-anchor="middle" font-size="21" font-weight="600" fill="#dbeafe">DecoderLayer 2</text>
  
    <rect x="775" y="421" width="260" height="62" rx="22" fill="#111c33" stroke="#c084fc" stroke-width="2"/>
    <rect x="775" y="421" width="8" height="62" rx="4" fill="#c084fc"/>
    <text x="909" y="460" text-anchor="middle" font-size="21" font-weight="600" fill="#dbeafe">DecoderLayer N</text>
  <path d="M 475 340 L 725 340" stroke="#fbbf24" stroke-width="4" fill="none" marker-end="url(#arrow)"/><text x="600" y="325" text-anchor="middle" font-size="20" font-weight="600" fill="#fbbf24">memory</text>
  </g>
  <rect x="90" y="565" width="1020" height="48" rx="14" fill="#0f2741" stroke="#1e3a5f"/>
  <text x="600" y="596" text-anchor="middle" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="600" fill="#bae6fd">每个 DecoderLayer 都读取同一份 memory；变化的是目标侧隐藏状态 x。</text>
</svg>
