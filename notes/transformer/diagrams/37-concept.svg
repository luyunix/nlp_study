<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">组件总复习</title>
  <desc id="desc">整模调试时沿数据流逐段检查张量形状，比只看最终报错更有效。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.55" stop-color="#f4fbf9"/>
      <stop offset="1" stop-color="#faf7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#47716d" flood-opacity=".12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1200" height="680" rx="34" fill="url(#bg)"/>
  <circle cx="1120" cy="70" r="150" fill="#c4b5fd" opacity=".22"/>
  <circle cx="70" cy="650" r="190" fill="#bae6fd" opacity=".28"/>
  <g filter="url(#shadow)">
    <rect x="55" y="45" width="1090" height="590" rx="30" fill="#ffffff" fill-opacity=".88" stroke="#d9e5e3"/>
  </g>
  <text x="90" y="100" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#38bdf8">第 37 节 · 概念图</text>
  <text x="90" y="145" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="800" fill="#17343a">组件总复习</text>
  <g font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">
    <rect x="120" y="150" width="350" height="380" rx="30" fill="#e8f4ff" stroke="#38bdf8" stroke-width="3"/><rect x="730" y="150" width="350" height="380" rx="30" fill="#f5edff" stroke="#a879d1" stroke-width="3"/><text x="295" y="205" text-anchor="middle" font-size="27" font-weight="800" fill="#38bdf8">ENCODER</text><text x="905" y="205" text-anchor="middle" font-size="27" font-weight="800" fill="#c084fc">DECODER</text>
    <rect x="165" y="245" width="260" height="62" rx="22" fill="#ffffff" stroke="#38bdf8" stroke-width="2"/>
    <rect x="165" y="245" width="8" height="62" rx="4" fill="#38bdf8"/>
    <text x="299" y="284" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">src_embed</text>
  
    <rect x="165" y="333" width="260" height="62" rx="22" fill="#ffffff" stroke="#38bdf8" stroke-width="2"/>
    <rect x="165" y="333" width="8" height="62" rx="4" fill="#38bdf8"/>
    <text x="299" y="372" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">encoder</text>
  
    <rect x="165" y="421" width="260" height="62" rx="22" fill="#ffffff" stroke="#38bdf8" stroke-width="2"/>
    <rect x="165" y="421" width="8" height="62" rx="4" fill="#38bdf8"/>
    <text x="299" y="460" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">memory</text>
  
    <rect x="775" y="245" width="260" height="62" rx="22" fill="#ffffff" stroke="#c084fc" stroke-width="2"/>
    <rect x="775" y="245" width="8" height="62" rx="4" fill="#c084fc"/>
    <text x="909" y="284" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">tgt_embed</text>
  
    <rect x="775" y="333" width="260" height="62" rx="22" fill="#ffffff" stroke="#c084fc" stroke-width="2"/>
    <rect x="775" y="333" width="8" height="62" rx="4" fill="#c084fc"/>
    <text x="909" y="372" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">decoder</text>
  
    <rect x="775" y="421" width="260" height="62" rx="22" fill="#ffffff" stroke="#c084fc" stroke-width="2"/>
    <rect x="775" y="421" width="8" height="62" rx="4" fill="#c084fc"/>
    <text x="909" y="460" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">generator</text>
  <path d="M 475 340 L 725 340" stroke="#fbbf24" stroke-width="4" fill="none" marker-end="url(#arrow)"/><text x="600" y="325" text-anchor="middle" font-size="20" font-weight="600" fill="#fbbf24">memory</text>
  </g>
  <rect x="90" y="565" width="1020" height="48" rx="14" fill="#e8f5f2" stroke="#b9d8d3"/>
  <text x="600" y="596" text-anchor="middle" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="600" fill="#285b5d">整模调试时沿数据流逐段检查张量形状，比只看最终报错更有效。</text>
</svg>
