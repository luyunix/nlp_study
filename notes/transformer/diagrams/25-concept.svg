<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">子层连接测试</title>
  <desc id="desc">SublayerConnection 只负责包装，具体子层通过可调用对象注入。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0b1730"/>
      <stop offset="1" stop-color="#15102b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000" flood-opacity=".3"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1200" height="680" rx="34" fill="url(#bg)"/>
  <circle cx="1120" cy="70" r="150" fill="#7c3aed" opacity=".09"/>
  <circle cx="70" cy="650" r="190" fill="#0284c7" opacity=".08"/>
  <g filter="url(#shadow)">
    <rect x="55" y="45" width="1090" height="590" rx="30" fill="#081426" fill-opacity=".6" stroke="#26334d"/>
  </g>
  <text x="90" y="100" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#38bdf8">第 25 节 · 概念图</text>
  <text x="90" y="145" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="800" fill="#f8fafc">子层连接测试</text>
  <g font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">
    <rect x="95" y="165" width="1010" height="350" rx="28" fill="#0c1c2c" stroke="#34d399" stroke-width="3"/><text x="170" y="220" text-anchor="start" font-size="28" font-weight="800" fill="#34d399">✓  可验证条件</text><circle cx="150" cy="268" r="13" fill="#064e3b" stroke="#34d399" stroke-width="2"/><text x="150" y="275" text-anchor="middle" font-size="18" font-weight="600" fill="#6ee7b7">✓</text><text x="180" y="275" text-anchor="start" font-size="21" font-weight="500" fill="#dbeafe">准备 Attention/FFN 子层</text><circle cx="625" cy="268" r="13" fill="#064e3b" stroke="#34d399" stroke-width="2"/><text x="625" y="275" text-anchor="middle" font-size="18" font-weight="600" fill="#6ee7b7">✓</text><text x="655" y="275" text-anchor="start" font-size="21" font-weight="500" fill="#dbeafe">用 lambda 传入额外参数</text><circle cx="150" cy="350" r="13" fill="#064e3b" stroke="#34d399" stroke-width="2"/><text x="150" y="357" text-anchor="middle" font-size="18" font-weight="600" fill="#6ee7b7">✓</text><text x="180" y="357" text-anchor="start" font-size="21" font-weight="500" fill="#dbeafe">验证残差形状一致</text><circle cx="625" cy="350" r="13" fill="#064e3b" stroke="#34d399" stroke-width="2"/><text x="625" y="357" text-anchor="middle" font-size="18" font-weight="600" fill="#6ee7b7">✓</text><text x="655" y="357" text-anchor="start" font-size="21" font-weight="500" fill="#dbeafe">验证 Dropout 与 LayerNorm 顺序</text>
  </g>
  <rect x="90" y="565" width="1020" height="48" rx="14" fill="#0f2741" stroke="#1e3a5f"/>
  <text x="600" y="596" text-anchor="middle" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="600" fill="#bae6fd">SublayerConnection 只负责包装，具体子层通过可调用对象注入。</text>
</svg>
