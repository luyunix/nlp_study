<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Scaled Dot-Product Attention</title>
  <desc id="desc">缩放避免维度变大时点积过大、Softmax 过早饱和。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.55" stop-color="#f4fbf9"/>
      <stop offset="1" stop-color="#faf7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#47716d" flood-opacity=".12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1200" height="680" rx="34" fill="url(#bg)"/>
  <circle cx="1120" cy="70" r="150" fill="#c4b5fd" opacity=".22"/>
  <circle cx="70" cy="650" r="190" fill="#bae6fd" opacity=".28"/>
  <g filter="url(#shadow)">
    <rect x="55" y="45" width="1090" height="590" rx="30" fill="#ffffff" fill-opacity=".88" stroke="#d9e5e3"/>
  </g>
  <text x="90" y="100" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#38bdf8">第 15 节 · 概念图</text>
  <text x="90" y="145" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="800" fill="#17343a">Scaled Dot-Product Attention</text>
  <g font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">
    
    <rect x="70" y="190" width="130" height="80" rx="22" fill="#ffffff" stroke="#38bdf8" stroke-width="2"/>
    <rect x="70" y="190" width="8" height="80" rx="4" fill="#38bdf8"/>
    <text x="139" y="238" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">Q</text>
  
    <rect x="245" y="190" width="130" height="80" rx="22" fill="#ffffff" stroke="#818cf8" stroke-width="2"/>
    <rect x="245" y="190" width="8" height="80" rx="4" fill="#818cf8"/>
    <text x="314" y="238" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">K</text>
  
    <rect x="420" y="190" width="130" height="80" rx="22" fill="#ffffff" stroke="#34d399" stroke-width="2"/>
    <rect x="420" y="190" width="8" height="80" rx="4" fill="#34d399"/>
    <text x="489" y="238" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">V</text>
  
    <rect x="140" y="340" width="240" height="90" rx="22" fill="#ffffff" stroke="#fbbf24" stroke-width="2"/>
    <rect x="140" y="340" width="8" height="90" rx="4" fill="#fbbf24"/>
    <text x="264" y="393" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">QKᵀ / √dₖ</text>
  <path d="M 135 275 L 210 335" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/><path d="M 310 275 L 310 335" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="480" y="340" width="190" height="90" rx="22" fill="#ffffff" stroke="#fb7185" stroke-width="2"/>
    <rect x="480" y="340" width="8" height="90" rx="4" fill="#fb7185"/>
    <text x="579" y="393" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">Mask</text>
  <path d="M 382 385 L 475 385" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="750" y="340" width="220" height="90" rx="22" fill="#ffffff" stroke="#c084fc" stroke-width="2"/>
    <rect x="750" y="340" width="8" height="90" rx="4" fill="#c084fc"/>
    <text x="864" y="393" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">Softmax</text>
  <path d="M 675 385 L 745 385" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="880" y="460" width="240" height="80" rx="22" fill="#ffffff" stroke="#34d399" stroke-width="2"/>
    <rect x="880" y="460" width="8" height="80" rx="4" fill="#34d399"/>
    <text x="1004" y="508" text-anchor="middle" font-size="21" font-weight="600" fill="#16324f">权重 × V</text>
  <path d="M 860 435 L 950 455" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/><path d="M 485 275 L 940 455" stroke="#34d399" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  </g>
  <rect x="90" y="565" width="1020" height="48" rx="14" fill="#e8f5f2" stroke="#b9d8d3"/>
  <text x="600" y="596" text-anchor="middle" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="600" fill="#285b5d">缩放避免维度变大时点积过大、Softmax 过早饱和。</text>
</svg>
