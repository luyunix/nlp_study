<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">模型搭建总结：固定十步 Attention Decoder 的完整接口</title>
  <desc id="desc">Encoder 返回 outputs/hidden，然后outputs 复制进 [1,10,H]，然后当前词+hidden 计算十个权重，然后context 融合后更新 hidden，然后返回 log_probs/hidden/weights</desc>
